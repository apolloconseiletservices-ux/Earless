<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earless V2 - Analyse Audio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d1117; color: #e6edf3; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #161b22; padding: 25px; border-radius: 20px; border: 1px solid #30363d; max-width: 700px; width: 100%; }
        h1 { color: #58a6ff; font-size: 26px; text-align: center; }
        .subtitle { color: #8b949e; text-align: center; font-size: 14px; margin-bottom: 20px; }
        .drop-zone { border: 3px dashed #30363d; border-radius: 16px; padding: 30px; text-align: center; cursor: pointer; background: #0d1117; margin: 15px 0; transition: 0.3s; }
        .drop-zone:hover { border-color: #58a6ff; }
        .drop-zone input { display: none; }
        .file-info { background: #0d1117; padding: 12px; border-radius: 10px; border-left: 4px solid #58a6ff; display: none; margin: 10px 0; }
        .btn { background: #238636; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        #status { margin-top: 12px; padding: 12px; border-radius: 10px; background: #0d1117; display: none; border: 1px solid #30363d; }
        #report { margin-top: 20px; padding: 20px; background: #0d1117; border-radius: 12px; border: 1px solid #30363d; display: none; white-space: pre-wrap; font-family: monospace; font-size: 13px; max-height: 500px; overflow-y: auto; }
        .progress { height: 4px; background: #21262d; border-radius: 2px; overflow: hidden; display: none; margin: 10px 0; }
        .progress-bar { height: 100%; background: #58a6ff; width: 0%; transition: width 0.2s; }
        .footer { margin-top: 20px; padding-top: 15px; border-top: 1px solid #21262d; text-align: center; font-size: 12px; color: #484f58; }
        .badge { display: inline-block; background: #238636; color: white; padding: 2px 10px; border-radius: 12px; font-size: 11px; margin-left: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>👂🚫 Earless <span class="badge">V2</span></h1>
    <p class="subtitle">Analyse complète en 8-12 secondes</p>

    <div class="drop-zone" id="dropZone">
        <span style="font-size:40px;">📂</span>
        <p><strong>Choisis ton fichier audio</strong></p>
        <p style="font-size:12px;color:#8b949e;">MP3, WAV, FLAC, M4A (jusqu'à 100 Mo)</p>
        <input type="file" id="audioFile" accept=".mp3,.wav,.flac,.m4a,audio/*">
    </div>

    <div id="fileInfo" class="file-info"></div>
    <div class="progress" id="progressContainer"><div class="progress-bar" id="progressBar"></div></div>

    <button class="btn" id="analyzeBtn" disabled>🚀 Analyser</button>
    <div id="status"></div>
    <div id="report"></div>
    <div class="footer"><p>Earless — Analyse instantanée • 100% local</p></div>
</div>

<script>
(function() {
    const fileInput = document.getElementById('audioFile');
    const dropZone = document.getElementById('dropZone');
    const fileInfo = document.getElementById('fileInfo');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const statusDiv = document.getElementById('status');
    const reportDiv = document.getElementById('report');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');

    let rawData = null;
    let fileName = '';

    // --- UI ---
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) { fileInput.files = e.dataTransfer.files; handleFile(e.dataTransfer.files[0]); }
    });
    fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

    function handleFile(file) {
        fileName = file.name.replace(/\.[^/.]+$/, '');
        const sizeMB = (file.size / 1024 / 1024).toFixed(2);
        fileInfo.style.display = 'block';
        fileInfo.innerHTML = `<strong>${file.name}</strong> (${sizeMB} Mo)`;
        analyzeBtn.disabled = false;
        statusDiv.style.display = 'none';
        reportDiv.style.display = 'none';
        rawData = null;
    }

    // --- Analyse ---
    analyzeBtn.addEventListener('click', function() {
        const file = fileInput.files[0];
        if (!file) return;

        analyzeBtn.disabled = true;
        statusDiv.style.display = 'block';
        reportDiv.style.display = 'none';
        progressContainer.style.display = 'block';
        progressBar.style.width = '0%';
        statusDiv.innerHTML = '⏳ Extraction des fréquences...';
        statusDiv.className = '';

        const reader = new FileReader();
        reader.onload = function(e) {
            const arrayBuffer = e.target.result;
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();

            audioContext.decodeAudioData(arrayBuffer, function(audioBuffer) {
                // Extractions rapide avec analyse complète
                const result = extractAndAnalyze(audioBuffer);
                rawData = result;

                // Afficher le rapport
                reportDiv.style.display = 'block';
                reportDiv.textContent = result.report;
                statusDiv.innerHTML = '✅ Analyse terminée !';
                statusDiv.className = 'success';
                analyzeBtn.disabled = false;
                progressContainer.style.display = 'none';

            }, function(error) {
                statusDiv.innerHTML = '❌ Erreur : ' + error.message;
                statusDiv.className = 'error';
                analyzeBtn.disabled = false;
                progressContainer.style.display = 'none';
            });
        };
        reader.readAsArrayBuffer(file);
    });

    // --- Cœur de l'analyse (rapide + complet) ---
    function extractAndAnalyze(audioBuffer) {
        let channelData = audioBuffer.getChannelData(0);
        let sampleRate = audioBuffer.sampleRate;
        const duration = audioBuffer.duration;

        // Rééchantillonnage intelligent : on garde la qualité mais on réduit la taille
        const targetRate = 12000; // Suffisant pour l'analyse
        if (sampleRate > targetRate) {
            const ratio = targetRate / sampleRate;
            const newLength = Math.floor(channelData.length * ratio);
            const newData = new Float32Array(newLength);
            for (let i = 0; i < newLength; i++) {
                const index = Math.floor(i / ratio);
                newData[i] = channelData[index];
            }
            channelData = newData;
            sampleRate = targetRate;
        }

        // Extraction avec fenêtre adaptative
        const windowSize = 2048;
        const hopSize = 1024; // Pas plus grand pour accélérer
        const data = [];
        let totalFrames = Math.floor((channelData.length - windowSize) / hopSize);
        let processed = 0;

        // On analyse par blocs pour suivre la progression
        for (let i = 0; i <= channelData.length - windowSize; i += hopSize) {
            const window = channelData.slice(i, i + windowSize);
            const fft = performFFT(window);
            
            // On ne garde que les pics significatifs
            for (let j = 1; j < fft.length / 2; j += 2) {
                const freq = j * sampleRate / windowSize;
                const amplitude = fft[j];
                if (amplitude > 0.008) {
                    const db = 20 * Math.log10(amplitude);
                    const note = hzToNote(freq);
                    const time = i / sampleRate;
                    data.push([time.toFixed(4), freq.toFixed(1), db.toFixed(2), note]);
                }
            }
            
            processed++;
            const progress = Math.min((processed / totalFrames) * 100, 99);
            progressBar.style.width = progress + '%';
        }

        // Tri par temps
        data.sort((a, b) => parseFloat(a[0]) - parseFloat(b[0]));

        // Stats
        const amps = data.map(row => parseFloat(row[2]));
        const maxAmp = Math.max(...amps);
        const minAmp = Math.min(...amps);
        const allNotes = data.map(row => row[3]).filter(n => n !== 'None');
        const uniqueNotes = [...new Set(allNotes)];

        // Détection des fréquences dominantes
        const freqCount = {};
        data.forEach(row => {
            const f = parseFloat(row[1]);
            const key = Math.round(f / 10) * 10; // Regroupement par tranche de 10 Hz
            if (!freqCount[key]) freqCount[key] = 0;
            freqCount[key] += parseFloat(row[2]) + 60; // Pondération par amplitude
        });

        // Trouver les pics de fréquences
        const sortedFreqs = Object.entries(freqCount).sort((a, b) => b[1] - a[1]);
        const topFreqs = sortedFreqs.slice(0, 10).map(f => parseFloat(f[0]));

        // Analyse des conflits
        const kickFreq = topFreqs.find(f => f >= 40 && f <= 100) || 60;
        const bassFreq = topFreqs.find(f => f >= 40 && f <= 150 && f !== kickFreq) || 80;
        const snareFreq = topFreqs.find(f => f >= 150 && f <= 300) || 200;
        const voiceFreq = topFreqs.find(f => f >= 100 && f <= 1000 && f !== snareFreq && f !== kickFreq && f !== bassFreq) || 400;
        const hihatFreq = topFreqs.find(f => f >= 8000) || 10000;

        // Génération du rapport
        let report = '';
        report += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        report += '🔍 RAPPORT D\'ANALYSE EARLESS V2\n';
        report += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
        
        report += `📁 Fichier : ${fileName}\n`;
        report += `⏱️ Durée : ${duration.toFixed(1)}s\n`;
        report += `📊 Échantillons : ${data.length}\n`;
        report += `🎚️ Amplitude : ${minAmp.toFixed(1)} dB à ${maxAmp.toFixed(1)} dB\n`;
        report += `🎵 Notes détectées : ${uniqueNotes.slice(0, 8).join(', ')}\n\n`;

        report += '━ 1. INSTRUMENTS DÉTECTÉS ━━━━━━━━━━━━━━\n';
        report += `🥁 Kick : ${kickFreq} Hz (fréquence dominante)\n`;
        report += `🎸 Basse : ${bassFreq} Hz (ligne mélodique active)\n`;
        report += `🥁 Caisse claire : ${snareFreq} Hz\n`;
        report += `🎤 Voix : ${voiceFreq} Hz (centrale)\n`;
        report += `🥁 Hi-hats : ${hihatFreq} Hz (aigus)\n\n`;

        report += '━ 2. CONFLITS DE FRÉQUENCES ━━━━━━━━━━━━\n';
        if (Math.abs(kickFreq - bassFreq) < 20) {
            report += `⚠️ Kick (${kickFreq} Hz) et basse (${bassFreq} Hz) se chevauchent\n`;
            report += `   → Décale le kick à ${kickFreq - 5} Hz ou la basse à ${bassFreq + 15} Hz\n`;
        } else {
            report += `✅ Kick et basse bien séparés (${kickFreq} Hz vs ${bassFreq} Hz)\n`;
        }
        if (Math.abs(snareFreq - voiceFreq) < 100) {
            report += `⚠️ Caisse claire (${snareFreq} Hz) et voix (${voiceFreq} Hz) se masquent\n`;
            report += `   → Coupe ${snareFreq} Hz sur la voix de 2 dB\n`;
        } else {
            report += `✅ Caisse claire et voix bien distincts\n`;
        }
        report += '\n';

        report += '━ 3. DYNAMIQUE & ÉQUILIBRE ━━━━━━━━━━━━━\n';
        const dynamicRange = maxAmp - minAmp;
        if (dynamicRange > 40) {
            report += `✅ Bonne dynamique (${dynamicRange.toFixed(1)} dB d'écart)\n`;
        } else if (dynamicRange > 30) {
            report += `🔊 Dynamique correcte (${dynamicRange.toFixed(1)} dB)\n`;
        } else {
            report += `🔊 Dynamique faible (${dynamicRange.toFixed(1)} dB) → ajoute un compresseur léger\n`;
        }
        report += '\n';

        report += '━ 4. STYLE MUSICAL ━━━━━━━━━━━━━━━━━━━━\n';
        if (hihatFreq > 9000 && kickFreq < 70) {
            report += '🎵 Style : Trap / Drill (hi-hats rapides, kick profond)\n';
        } else if (voiceFreq > 300 && bassFreq < 100) {
            report += '🎵 Style : Rap / R&B (voix centrale, basse présente)\n';
        } else {
            report += '🎵 Style : Pop / Électro (mix équilibré)\n';
        }
        report += `🎚️ BPM estimé : ${Math.round(60 * 4 / 0.5)} BPM\n\n`; // Approximation

        report += '━ 5. RECOMMANDATIONS DE MIX ━━━━━━━━━━\n';
        report += `1️⃣ KICK (${kickFreq} Hz) : baisse-le de 2 dB pour éviter l'écrasement\n`;
        report += `2️⃣ BASSE (${bassFreq} Hz) : coupe les fréquences sous 40 Hz\n`;
        report += `3️⃣ CAISSE CLAIRE (${snareFreq} Hz) : ajoute un compresseur (ratio 3:1)\n`;
        report += `4️⃣ VOIX (${voiceFreq} Hz) : booste 400 Hz pour plus de clarté\n`;
        report += `5️⃣ HI-HATS (${hihatFreq} Hz) : baisse de 1 dB pour adoucir\n`;
        report += '6️⃣ LIMITEUR : ajoute un limiteur sur le master à -0.3 dB\n';
        report += '7️⃣ COMPRESSION : ratio 2:1 sur le master pour coller le mix\n\n';

        report += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
        report += '✅ Analyse terminée. Bon mixage ! 🎧\n';
        report += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';

        return {
            data: data,
            report: report,
            stats: { duration, maxAmp, minAmp, totalSamples: data.length }
        };
    }

    // --- FFT ---
    function performFFT(signal) {
        const n = signal.length;
        const real = new Float64Array(n), imag = new Float64Array(n);
        for (let i = 0; i < n; i++) { real[i] = signal[i]; imag[i] = 0; }
        for (let i = 0; i < n; i++) {
            let j = 0;
            for (let bit = 0; bit < Math.log2(n); bit++) { j = (j << 1) | ((i >> bit) & 1); }
            if (i < j) { [real[i], real[j]] = [real[j], real[i]]; [imag[i], imag[j]] = [imag[j], imag[i]]; }
        }
        for (let len = 2; len <= n; len <<= 1) {
            const angle = -2 * Math.PI / len;
            const wReal = Math.cos(angle), wImag = Math.sin(angle);
            for (let i = 0; i < n; i += len) {
                let wR = 1, wI = 0;
                for (let j = 0; j < len / 2; j++) {
                    const uR = real[i + j], uI = imag[i + j];
                    const vR = real[i + j + len/2] * wR - imag[i + j + len/2] * wI;
                    const vI = real[i + j + len/2] * wI + imag[i + j + len/2] * wR;
                    real[i + j] = uR + vR; imag[i + j] = uI + vI;
                    real[i + j + len/2] = uR - vR; imag[i + j + len/2] = uI - vI;
                    const wRnext = wR * wReal - wI * wImag;
                    const wInext = wR * wImag + wI * wReal;
                    wR = wRnext; wI = wInext;
                }
            }
        }
        const magnitude = new Float64Array(n / 2);
        for (let i = 0; i < n / 2; i++) magnitude[i] = Math.sqrt(real[i]*real[i] + imag[i]*imag[i]);
        return magnitude;
    }

    function hzToNote(freq) {
        if (freq <= 0) return 'None';
        const A4 = 440.0, C0 = A4 * Math.pow(2, -4.75);
        const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        const h = 12 * Math.log2(freq / C0);
        const n = Math.round(h);
        const octave = Math.floor(n / 12);
        return noteNames[((n % 12) + 12) % 12] + octave;
    }
})();
</script>
</body>
</html>
