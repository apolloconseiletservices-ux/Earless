<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earless - Analyse IA</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d1117; color: #e6edf3; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #161b22; padding: 25px; border-radius: 20px; border: 1px solid #30363d; max-width: 700px; width: 100%; }
        h1 { color: #58a6ff; font-size: 26px; text-align: center; }
        .subtitle { color: #8b949e; text-align: center; font-size: 14px; margin-bottom: 20px; }
        .drop-zone { border: 3px dashed #30363d; border-radius: 16px; padding: 30px; text-align: center; cursor: pointer; background: #0d1117; margin: 15px 0; }
        .drop-zone input { display: none; }
        .file-info { background: #0d1117; padding: 12px; border-radius: 10px; border-left: 4px solid #58a6ff; display: none; margin: 10px 0; }
        .btn { background: #238636; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn:disabled { background: #21262d; color: #484f58; }
        .btn-secondary { background: #21262d; margin-top: 8px; }
        #status { margin-top: 12px; padding: 12px; border-radius: 10px; background: #0d1117; display: none; border: 1px solid #30363d; }
        #report { margin-top: 20px; padding: 20px; background: #0d1117; border-radius: 12px; border: 1px solid #30363d; display: none; white-space: pre-wrap; font-family: monospace; font-size: 13px; max-height: 500px; overflow-y: auto; }
        .progress { height: 4px; background: #21262d; border-radius: 2px; overflow: hidden; display: none; margin: 10px 0; }
        .progress-bar { height: 100%; background: #58a6ff; width: 0%; }
        .footer { margin-top: 20px; padding-top: 15px; border-top: 1px solid #21262d; text-align: center; font-size: 12px; color: #484f58; }
    </style>
</head>
<body>
<div class="container">
    <h1>👂🚫 Earless</h1>
    <p class="subtitle">Analyse audio + IA (gratuit)</p>

    <div class="drop-zone" id="dropZone">
        <span style="font-size:40px;">📂</span>
        <p><strong>Choisis ton fichier audio</strong></p>
        <p style="font-size:12px;color:#8b949e;">MP3, WAV, FLAC, AAC, OGG, M4A</p>
        <input type="file" id="audioFile" accept=".mp3,.wav,.flac,.aac,.ogg,.m4a,audio/*">
    </div>

    <div id="fileInfo" class="file-info"></div>
    <div class="progress" id="progressContainer"><div class="progress-bar" id="progressBar"></div></div>

    <button class="btn" id="analyzeBtn" disabled>🚀 Analyser avec IA</button>
    <div id="status"></div>
    <div id="report"></div>
    <div class="footer"><p>Earless — Analyse instantanée</p></div>
</div>

<script>
    (function() {
        const fileInput = document.getElementById('audioFile');
        const dropZone = document.getElementById('dropZone');
        const fileInfo = document.getElementById('fileInfo');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const statusDiv = document.getElementById('status');
        const reportDiv = document.getElementById('report');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');

        let csvData = null;
        let fileName = '';

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) { fileInput.files = e.dataTransfer.files; handleFile(e.dataTransfer.files[0]); }
        });
        fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

        function handleFile(file) {
            fileName = file.name.replace(/\.[^/.]+$/, '');
            fileInfo.style.display = 'block';
            fileInfo.innerHTML = `<strong>${file.name}</strong> (${(file.size/1024/1024).toFixed(2)} Mo)`;
            analyzeBtn.disabled = false;
            statusDiv.style.display = 'none';
            reportDiv.style.display = 'none';
            csvData = null;
        }

        analyzeBtn.addEventListener('click', function() {
            const file = fileInput.files[0];
            if (!file) return;

            analyzeBtn.disabled = true;
            statusDiv.style.display = 'block';
            reportDiv.style.display = 'none';
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            statusDiv.innerHTML = '⏳ Extraction du CSV...';
            statusDiv.className = '';

            const reader = new FileReader();
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();

                audioContext.decodeAudioData(arrayBuffer, function(audioBuffer) {
                    const result = extractFrequencies(audioBuffer);
                    csvData = result.csv;

                    progressBar.style.width = '100%';
                    statusDiv.innerHTML = '🔍 Envoi à l\'IA... (5-10 sec)';
                    statusDiv.className = '';

                    // SIMULATION DE L'APPEL API (remplace par ton endpoint réel)
                    // Pour l'instant, on génère un rapport fictif basé sur les données
                    setTimeout(() => {
                        const report = generateReport(result.stats, file.name);
                        reportDiv.style.display = 'block';
                        reportDiv.textContent = report;
                        statusDiv.innerHTML = '✅ Analyse terminée !';
                        statusDiv.className = 'success';
                        analyzeBtn.disabled = false;
                        progressContainer.style.display = 'none';
                    }, 2000);

                }, function(error) {
                    statusDiv.innerHTML = '❌ Erreur : ' + error.message;
                    statusDiv.className = 'error';
                    analyzeBtn.disabled = false;
                    progressContainer.style.display = 'none';
                });
            };
            reader.readAsArrayBuffer(file);
        });

        // ---------- EXTRACTION FREQUENCES ----------
        function extractFrequencies(audioBuffer) {
            let channelData = audioBuffer.getChannelData(0);
            let sampleRate = audioBuffer.sampleRate;
            const targetRate = 8000;
            if (sampleRate > targetRate) {
                const ratio = targetRate / sampleRate;
                const newLength = Math.floor(channelData.length * ratio);
                const newData = new Float32Array(newLength);
                for (let i = 0; i < newLength; i++) {
                    const index = Math.floor(i / ratio);
                    newData[i] = channelData[index];
                }
                channelData = newData;
                sampleRate = targetRate;
            }

            const data = [];
            const windowSize = 1024;
            const hopSize = 512;
            let totalFrames = Math.floor((channelData.length - windowSize) / hopSize);
            let processed = 0;

            for (let i = 0; i <= channelData.length - windowSize; i += hopSize) {
                const window = channelData.slice(i, i + windowSize);
                const fft = performFFT(window);
                for (let j = 1; j < fft.length / 2; j++) {
                    const freq = j * sampleRate / windowSize;
                    const amplitude = fft[j];
                    if (amplitude > 0.01) {
                        const db = 20 * Math.log10(amplitude);
                        const note = hzToNote(freq);
                        const time = i / sampleRate;
                        data.push([time.toFixed(4), freq.toFixed(1), db.toFixed(2), note]);
                    }
                }
                processed++;
                progressBar.style.width = Math.min((processed / totalFrames) * 100, 99) + '%';
            }

            data.sort((a, b) => parseFloat(a[0]) - parseFloat(b[0]));
            let csv = 'Temps(s),Frequence(Hz),Amplitude(dB),Note\n';
            data.forEach(row => csv += row.join(',') + '\n');

            const allNotes = data.map(row => row[3]).filter(n => n !== 'None');
            const uniqueNotes = [...new Set(allNotes)];
            const maxAmp = Math.max(...data.map(row => parseFloat(row[2])));
            const minAmp = Math.min(...data.map(row => parseFloat(row[2])));

            return {
                csv: csv,
                stats: {
                    totalSamples: data.length,
                    duration: audioBuffer.duration.toFixed(2),
                    notes: uniqueNotes.slice(0, 12).join(', '),
                    maxAmplitude: maxAmp.toFixed(1),
                    minAmplitude: minAmp.toFixed(1)
                }
            };
        }

        function performFFT(signal) {
            const n = signal.length;
            const real = new Float64Array(n), imag = new Float64Array(n);
            for (let i = 0; i < n; i++) { real[i] = signal[i]; imag[i] = 0; }
            for (let i = 0; i < n; i++) {
                let j = 0;
                for (let bit = 0; bit < Math.log2(n); bit++) { j = (j << 1) | ((i >> bit) & 1); }
                if (i < j) { [real[i], real[j]] = [real[j], real[i]]; [imag[i], imag[j]] = [imag[j], imag[i]]; }
            }
            for (let len = 2; len <= n; len <<= 1) {
                const angle = -2 * Math.PI / len;
                const wReal = Math.cos(angle), wImag = Math.sin(angle);
                for (let i = 0; i < n; i += len) {
                    let wR = 1, wI = 0;
                    for (let j = 0; j < len / 2; j++) {
                        const uR = real[i + j], uI = imag[i + j];
                        const vR = real[i + j + len/2] * wR - imag[i + j + len/2] * wI;
                        const vI = real[i + j + len/2] * wI + imag[i + j + len/2] * wR;
                        real[i + j] = uR + vR; imag[i + j] = uI + vI;
                        real[i + j + len/2] = uR - vR; imag[i + j + len/2] = uI - vI;
                        const wRnext = wR * wReal - wI * wImag;
                        const wInext = wR * wImag + wI * wReal;
                        wR = wRnext; wI = wInext;
                    }
                }
            }
            const magnitude = new Float64Array(n / 2);
            for (let i = 0; i < n / 2; i++) magnitude[i] = Math.sqrt(real[i]*real[i] + imag[i]*imag[i]);
            return magnitude;
        }

        function hzToNote(freq) {
            if (freq <= 0) return 'None';
            const A4 = 440.0, C0 = A4 * Math.pow(2, -4.75);
            const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
            const h = 12 * Math.log2(freq / C0);
            const n = Math.round(h);
            const octave = Math.floor(n / 12);
            const note = noteNames[((n % 12) + 12) % 12];
            return note + octave;
        }

        // ---------- GENERATEUR DE RAPPORT ----------
        function generateReport(stats, filename) {
            const duration = parseFloat(stats.duration);
            const maxAmp = parseFloat(stats.maxAmplitude);
            const minAmp = parseFloat(stats.minAmplitude);

            let report = '';
            report += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
            report += '🔍 RAPPORT D\'ANALYSE EARLESS\n';
            report += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';

            report += `📁 Fichier : ${filename}\n`;
            report += `⏱️ Durée : ${duration}s\n`;
            report += `📊 Échantillons : ${stats.totalSamples}\n`;
            report += `🎵 Notes : ${stats.notes}\n`;
            report += `🎚️ Amplitude : ${minAmp} dB à ${maxAmp} dB\n\n`;

            // 1. Instruments détectés
            report += '━ 1. INSTRUMENTS DÉTECTÉS ━━━━━━━━━━━━━━\n';
            report += '🥁 Kick : présent vers 50-80 Hz (puissant)\n';
            report += '🎸 Basse : ligne mélodique active (40-150 Hz)\n';
            report += '🥁 Caisse claire : détectée vers 180-220 Hz\n';
            report += '🎤 Voix : présente entre 100-1000 Hz\n';
            report += '🥁 Hi-hats : actifs dans les aigus (>8000 Hz)\n\n';

            // 2. Conflits de fréquences
            report += '━ 2. CONFLITS DE FRÉQUENCES ━━━━━━━━━━━━\n';
            report += '⚠️ Kick et basse se chevauchent vers 60-70 Hz\n';
            report += '   → Décale le kick à 55 Hz ou la basse à 80 Hz\n';
            report += '⚠️ La caisse claire masque la voix vers 200 Hz\n';
            report += '   → Coupe 200 Hz sur la voix de 2 dB\n\n';

            // 3. Équilibre et dynamique
            report += '━ 3. ÉQUILIBRE & DYNAMIQUE ━━━━━━━━━━━━\n';
            if (maxAmp > -15) {
                report += '🔊 Le morceau est très compressé (peu de dynamique)\n';
                report += '   → Ajoute un peu de plage dynamique avec un compresseur léger\n';
            } else if (maxAmp < -30) {
                report += '🔉 Le morceau est trop faible en volume global\n';
                report += '   → Ajoute un limiteur pour gagner 6 dB\n';
            } else {
                report += '✅ Bonne dynamique générale\n';
            }
            report += '\n';

            // 4. Style musical
            report += '━ 4. STYLE MUSICAL ━━━━━━━━━━━━━━━━━━━━\n';
            if (duration > 180) {
                report += '🎵 Style : Rap/Trap (kick accentué, hi-hats rapides)\n';
            } else if (duration < 60) {
                report += '🎵 Style : Court extrait, probablement une démo\n';
            } else {
                report += '🎵 Style : Pop/R&B (voix centrale, basse présente)\n';
            }
            report += '🎚️ BPM estimé : 140-145 BPM\n\n';

            // 5. Recommandations
            report += '━ 5. RECOMMANDATIONS DE MIX ━━━━━━━━━━\n';
            report += '1️⃣ KICK : baisse-le de 2 dB pour éviter l\'écrasement\n';
            report += '2️⃣ BASSE : coupe les fréquences sous 40 Hz (sub-son)\n';
            report += '3️⃣ CAISSE CLAIRE : ajoute un compresseur pour plus de punch\n';
            report += '4️⃣ VOIX : booste 400 Hz pour plus de clarté\n';
            report += '5️⃣ HI-HATS : baisse de 1 dB pour adoucir les aigus\n';
            report += '6️⃣ LIMITEUR : ajoute un limiteur sur le master à -0.3 dB\n';
            report += '7️⃣ COMPRESSION : ratio 2:1 sur le master pour coller le mix\n\n';

            report += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
            report += '✅ Analyse terminée. Bon mixage ! 🎧\n';
            report += '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';

            return report;
        }
    })();
</script>
</body>
</html>
